name: Publish pypromice-tx to PyPI

on:
  push:
    tags:
      - 'pypromice-tx/v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build package
        run: |
          pip install build
          python -m build packages/pypromice-tx/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pypromice-tx/dist/
