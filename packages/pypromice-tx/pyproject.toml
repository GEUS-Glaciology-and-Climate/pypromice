[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pypromice-tx"
version = "1.0.0"
description = "PROMICE/GC-Net AWS data transmission: email fetching and payload decoding"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "GEUS Glaciology and Climate" }
]
keywords = ["promice", "gc-net", "aws", "iridium", "imap", "sbd", "transmission"]

dependencies = [
    "toml",
    "pandas",
    "numpy",
]

[project.optional-dependencies]
google = [
    "google-auth",
    "google-auth-oauthlib",
    "google-auth-httplib2",
    "google-api-python-client",
]

[project.urls]
Homepage = "https://github.com/GEUS-Glaciology-and-Climate/pypromice"

[project.scripts]
get_l0tx = "pypromice.tx.get_l0tx:main"
get_msg = "pypromice.tx.get_msg:get_msg"
decode_qpayload = "pypromice.tx.payload_decoder:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"pypromice.tx" = ["payload_formats.csv", "payload_types.csv"]
